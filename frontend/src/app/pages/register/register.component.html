<div class="auth-page">
  <div class="auth-card">
    <div class="brand">⚡ Corp Agent AI</div>
    <h1>Utwórz konto</h1>
    <form (ngSubmit)="submit()" #f="ngForm">
      <div class="field">
        <label>Imię i nazwisko</label>
        <input type="text" [(ngModel)]="name" name="name" required autocomplete="name" />
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" name="email" required autocomplete="email" />
      </div>
      <div class="field">
        <label>Hasło <span class="hint">(min. 8 znaków)</span></label>
        <input type="password" [(ngModel)]="password" name="password" required minlength="8" autocomplete="new-password" />
      </div>
      @if (error) {
        <p class="error">{{ error }}</p>
      }
      <button type="submit" [disabled]="loading">
        {{ loading ? 'Rejestracja...' : 'Zarejestruj się' }}
      </button>
    </form>
    <p class="switch">Masz już konto? <a routerLink="/login">Zaloguj się</a></p>
  </div>
</div>
