name: agentic-review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ai-devops-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - name: AI DevOps review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BASE_REF: origin/${{ github.base_ref }}
          AI_REVIEW_MODEL: claude-sonnet-4-5-20250929
        run: node backend/scripts/ai-devops-review.mjs
